project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "**/*.qmd"

license: "CC BY"
execute:
  freeze: true     # cache by default; override per-file as needed

website:
  title: "Pierre-Paul Axisa"
  description: "Computational biologist — variant-to-function genomics, CBMR, University of Copenhagen"
  site-url: https://ppaxisa.github.io
  favicon: images/icon.png
  image: images/avatar.jpg
  open-graph: true
  #twitter-card: true
  google-analytics: ""   # optional

  navbar:
    pinned: true
    left:
      - href: publications.qmd
        text: Publications
      - href: software.qmd
        text: Software
      - href: comp.qmd
        text: Computational projects


  page-footer:
    background: light
    center: "© 2026 · Built with [Quarto](https://quarto.org)"
    right:
      - icon: github
        href: https://github.com/ppaxisa

format:
  html:
    theme:
      light: sandstone
      dark: darkly
    toc: true
    highlight-style: github
    grid:
      sidebar-width: 250px
    css: styles/main.css
